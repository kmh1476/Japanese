<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 종이 단어장</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
    body {
        background-color: #f4f1ea;
        background-image: radial-gradient(#d1cfc8 0.5px, transparent 0.5px);
        background-size: 20px 20px;
        /* 2. 폰트 우선순위를 일본어 서체(JP) 우선으로 설정합니다 */
        font-family: 'Noto Sans JP', 'Noto Sans KR', sans-serif;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        color: #333;
        /* 3. 글자가 뭉쳐 보이지 않게 부드럽게 렌더링 설정 */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    /* 한자 부분에 폰트 두께를 살짝 조절해서 가독성을 높입니다 */
    .kanji { 
        font-family: 'Noto Sans JP', sans-serif;
        font-size: 1.3rem; 
        font-weight: 500; /* 너무 굵으면 뭉치니 500~700 사이에서 조절 */
        margin-bottom: 3px; 
        padding-left: 10px; 
        word-break: break-all;
        color: #2c3e50; /* 색상을 아주 살짝 푸른기 도는 검정으로 바꾸면 더 선명해요 */
    }
        header { margin-bottom: 20px; text-align: center; }
        h1 { font-size: 1.2rem; letter-spacing: 3px; color: #5d5d5d; border-bottom: 2px solid #e74c3c; display: inline-block; }

        /* 검색창 크기 및 디자인 조절 */
        .search-container {
            width: 100%;
            max-width: 400px; /* 검색창 너무 길지 않게 제한 */
            position: sticky;
            top: 20px;
            z-index: 100;
            margin-bottom: 30px;
        }

        #search-input {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid #ccc;
            border-radius: 4px; /* 종이 느낌에 맞춰 약간 각지게 */
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
            font-size: 0.9rem;
            outline: none;
            box-sizing: border-box;
        }

        /* 단어 카드 리스트 - 크기 축소 */
        #voca-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); /* 최소 너비 줄임 */
            gap: 15px;
        }

        .card {
            background: #fff;
            padding: 15px;
            min-height: 100px; /* 세로 크기도 줄임 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.05);
            border: 1px solid #efefef;
            transition: all 0.2s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 1px;
            background: #ff7675;
            opacity: 0.5;
        }

        .kanji { font-size: 1.3rem; font-weight: 700; margin-bottom: 3px; padding-left: 10px; word-break: break-all; }
        .yomi { font-size: 0.8rem; color: #999; margin-bottom: 8px; padding-left: 10px; }
        .meaning { font-size: 0.95rem; color: #444; padding-left: 10px; border-top: 1px dashed #eee; padding-top: 8px; }

        .loading { font-style: italic; color: #888; grid-column: 1 / -1; text-align: center; }

        @media (max-width: 400px) {
            #voca-container { grid-template-columns: 1fr 1fr; } /* 모바일에서도 2줄로 보이게 */
            .kanji { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<header><h1>単語帳</h1></header>

<div class="search-container">
    <input type="text" id="search-input" placeholder="한자, 발음, 초성 검색..." disabled>
</div>

<div id="voca-container">
    <p class="loading">단어장을 펼치는 중...</p>
</div>

<script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR6XdK394z-VSBOsBIq_nE20ZYWTgQciG_H5wL-e_9XaOaJzP9DwIeNJ4JAOX9X01h3zcFfSy8x4V3N/pub?output=csv";
    let vocaData = [];

    // --- 초성 검색 로직 ---
    function getChosung(str) {
        const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
        let result = "";
        for(let i=0; i<str.length; i++) {
            let code = str.charCodeAt(i) - 44032;
            if(code > -1 && code < 11172) result += cho[Math.floor(code/588)];
            else result += str.charAt(i);
        }
        return result;
    }

    async function init() {
        const container = document.getElementById('voca-container');
        const searchInput = document.getElementById('search-input');

        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const rows = csvText.split(/\r?\n/).slice(1); 
            
            vocaData = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const item = {
                    kanji: cols[0]?.replace(/"/g, '').trim() || '',
                    yomi: cols[1]?.replace(/"/g, '').trim() || '',
                    meaning: cols[2]?.replace(/"/g, '').trim() || ''
                };
                // 검색 효율을 위해 초성 미리 계산
                item.chosung = getChosung(item.meaning); 
                return item;
            }).filter(item => item.kanji);

            searchInput.disabled = false;
            displayVoca(vocaData);
        } catch (error) {
            container.innerHTML = `<p style="color:red">연결 실패!</p>`;
        }
    }

    function displayVoca(data) {
        const container = document.getElementById('voca-container');
        container.innerHTML = '';
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="kanji">${item.kanji}</div>
                <div class="yomi">${item.yomi}</div>
                <div class="meaning">${item.meaning}</div>
            `;
            container.appendChild(card);
        });
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
        const keyword = e.target.value.toLowerCase().replace(/\s/g, "");
        
        const filtered = vocaData.filter(item => {
            const targetKanji = item.kanji.toLowerCase();
            const targetYomi = item.yomi.toLowerCase();
            const targetMeaning = item.meaning.toLowerCase();
            const targetChosung = item.chosung;

            return targetKanji.includes(keyword) || 
                   targetYomi.includes(keyword) || 
                   targetMeaning.includes(keyword) || 
                   targetChosung.includes(keyword);
        });
        displayVoca(filtered);
    });

    init();
</script>

</body>
</html>
